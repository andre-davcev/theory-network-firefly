<ion-app>
    <ion-menu side="end" type="reveal" contentId="main" (ionDidClose)="menuClosed()" (ionWillOpen)="menuOpened()">
        <ion-content color="dark">
            <ion-list lines="none">
                <ion-item-group>
                    <ion-item-divider color="dark">
                        <ion-label color="medium">{{ 'menu.title' | translate }}</ion-label>
                    </ion-item-divider>

                    <ion-item (click)="go(Pages.Home)">
                        <ion-icon name="home" slot="start" color="primary"></ion-icon>
                        <ion-label color="medium">{{ 'menu.home' | translate }}</ion-label>
                    </ion-item>

                    <ion-item (click)="go(Pages.Subscriptions)">
                        <ion-icon name="options" slot="start" color="primary"></ion-icon>
                        <ion-label color="medium">{{ 'menu.subscriptions' | translate }}</ion-label>
                    </ion-item>

                    <ion-item (click)="go(Pages.Publisher)">
                        <ion-icon name="logo-rss" slot="start" color="primary"></ion-icon>
                        <ion-label color="medium">{{ 'menu.publisher' | translate }}</ion-label>
                    </ion-item>

<!--
                    <ion-item>
                        <ion-icon name="contact" slot="start" color="primary"></ion-icon>
                        <ion-label color="medium">{{'menu.account.profile' | translate}}</ion-label>
                    </ion-item>
-->
                    <ion-item (click)="logout()">
                        <ion-icon name="unlock" slot="start" color="primary"></ion-icon>
                        <ion-label color="medium">{{'menu.account.log-out' | translate}}</ion-label>
                    </ion-item>
                </ion-item-group>
            </ion-list>
        </ion-content>
    </ion-menu>

    <ion-router-outlet id="main"></ion-router-outlet>
</ion-app>
