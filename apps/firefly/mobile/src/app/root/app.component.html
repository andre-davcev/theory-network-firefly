<ion-app>
    <ion-menu side="end" type="reveal" content-id="main" (ionDidClose)="menuClosed()" (ionWillOpen)="menuOpened()">
        <ion-content color="dark">
            <ion-list lines="none">
                <ion-item-group>
                    <ion-item [class.cpt-selected]="pageHome$ | async"
                              (click)="go(Pages.Home)">
                        <ion-icon name="home" slot="start" color="primary"></ion-icon>
                        <ion-label color="medium">{{ 'menu.home' | translate }}</ion-label>
                    </ion-item>
<!--
                    <ion-item [class.cpt-selected]="pageSubscriptions$ | async"
                              (click)="go(Pages.Subscriptions)">
                        <ion-icon name="options" slot="start" color="primary"></ion-icon>
                        <ion-label color="medium">{{ 'menu.subscriptions' | translate }}</ion-label>
                    </ion-item>
-->

                    <ion-item [class.cpt-selected]="pageUserProfile$ | async"
                              (click)="go(Pages.UserProfile)">
                        <ion-icon name="settings" slot="start" color="primary"></ion-icon>
                        <ion-label color="medium">{{ 'menu.account.profile' | translate }}</ion-label>
                    </ion-item>

                    <ion-item [class.cpt-selected]="pagePublishEvents$ | async"
                    (click)="go(Pages.AssetsEvents)">
                        <ion-icon [name]="IconType.Events" slot="start" color="primary"></ion-icon>
                        <ion-label color="medium">{{ 'menu.assets.events' | translate }}</ion-label>
                    </ion-item>

                    <ion-item (click)="logout()">
                        <ion-icon name="lock-open" slot="start" color="primary"></ion-icon>
                        <ion-label color="medium">{{ 'menu.account.log-out' | translate }}</ion-label>
                    </ion-item>
                </ion-item-group>
            </ion-list>
        </ion-content>
    </ion-menu>

    <ion-router-outlet id="main"></ion-router-outlet>
</ion-app>
