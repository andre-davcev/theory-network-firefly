<ion-header>
    <ion-toolbar>
        <ion-title>{{'page.assets-icons.title' | translate}}</ion-title>
        <ion-buttons slot="start">
            <ion-back-button></ion-back-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content>
    <ion-fab slot="fixed" vertical="bottom" right href="/icons">
        <ion-fab slot="fixed" color="secondary">
            <ion-icon name="md-add"></ion-icon>
        </ion-fab>
    </ion-fab>

    <ion-grid>
        <ion-row>
            <ion-col size="3" *ngFor="let icon of icons">
                <img class="cpt-icon" [src]="icon">
            </ion-col>
        </ion-row>
    </ion-grid>
</ion-content>
