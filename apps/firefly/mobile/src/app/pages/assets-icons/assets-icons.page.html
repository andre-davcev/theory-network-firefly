<ion-header>
    <ion-toolbar>
        <ion-title>{{'page.assets-icons.title' | translate}}</ion-title>
        <ion-buttons slot="start">
            <ion-back-button></ion-back-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content>
    <ion-grid>
        <ion-row>
            <ion-col size="3" *ngFor="let icon of icons$ | async">
                <img class="cpt-icon" [src]="icon.bucketPathSmall">
            </ion-col>
        </ion-row>
    </ion-grid>

    <ion-fab slot="fixed" vertical="bottom" horizontal="end">
      <ion-fab-button color="secondary" mode="md" (click)="navigate()">
          <ion-icon name="md-add"></ion-icon>
      </ion-fab-button>
  </ion-fab>
</ion-content>
