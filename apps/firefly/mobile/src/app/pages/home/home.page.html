<ion-header>
  <ion-toolbar>
      <ion-buttons slot="secondary" fxLayout="row" fxLayoutAlign="space-between center">
          <ion-button icon-only (click)="navigate(Pages.Search)">
              <ion-icon name="search" color="dark" size="large"></ion-icon>
          </ion-button>
          <ion-button icon-only (click)="navigate(Pages.Subscriptions)">
              <ion-icon name="options" color="dark" size="large"></ion-icon>
          </ion-button>
          <ion-button icon-only (click)="navigate(Pages.AssetEvent)">
              <ion-icon name="md-add" color="dark" size="large"></ion-icon>
          </ion-button>
          <ion-button icon-only (click)="navigate(Pages.Assets)">
              <ion-icon name="cloud-outline" color="dark" size="large"></ion-icon>
          </ion-button>
          <ion-button icon-only (click)="navigate(Pages.User)">
            <ion-icon name="person" color="dark" size="large"></ion-icon>
        </ion-button>
      </ion-buttons>
  </ion-toolbar>
</ion-header>
<section fxLayout="column" fxLayoutAlign="center">
  <router-outlet></router-outlet>
</section>
<ion-footer>
  <ion-toolbar>
      <ion-buttons slot="secondary" fxLayout="row" fxLayoutAlign="space-between center">
          <ion-button *ngIf="alertToggle" icon-only (click)="alertStreamToggle();">
              <ion-icon name="notifications" color="dark" size="large"></ion-icon>
          </ion-button>
          <ion-button *ngIf="!alertToggle" icon-only (click)="alertStreamToggle();">
            <ion-icon name="md-paper" color="dark" size="large"></ion-icon>
          </ion-button>
          <ion-button *ngIf="!alertToggle" icon-only>
              <ion-icon name="md-trash" color="dark" size="large"></ion-icon>
          </ion-button>
      </ion-buttons>
  </ion-toolbar>
</ion-footer>
