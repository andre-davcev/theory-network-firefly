<ion-header>
    <ion-toolbar>
        <ion-title>{{'page.event-locations-add.title' | translate}}</ion-title>
        <ion-buttons slot="start">
            <ion-button (click)="dismissModal()">{{'general.done' | translate}}</ion-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content class="app-transparent" (click)="dismissModalWithCheck()">
    <ion-searchbar (ionInput)="search($event)" (click)="clickedSearch()"></ion-searchbar>

    <ion-list class="page-list">
        <ion-item *ngFor="let place of results$ | async" (click)="add(place)">
            <ion-icon name="pin" color="secondary" slot="start"></ion-icon>
            <ion-label>{{ place.description }}</ion-label>
        </ion-item>
    </ion-list>
</ion-content>
