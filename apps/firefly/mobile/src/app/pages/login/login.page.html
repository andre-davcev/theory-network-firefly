
<ion-header *ngIf="page !== Pages.SignUpSlides"
            mode="ios">
    <ion-toolbar color="dark">
        <ion-buttons slot="start">
            <ion-button icon-only (click)="close()" *ngIf="!(userLoading$ | async)" >
                <ion-icon name="close" color="primary"></ion-icon>
            </ion-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<section *ngIf="page === Pages.Login || page === Pages.SignUp || page === Pages.ResetPassword"
         class="cpt-container"
         fxLayout="column"
         fxLayoutAlign="center"
         fxLayoutGap="2rem">
    <app-logo [loading]="userLoading$ | async"></app-logo>
    <app-auth [login]="page === Pages.Login" [resetPassword]="page === Pages.ResetPassword" (finished)="finishedAuth($event)"></app-auth>
</section>

<ion-slides *ngIf="page === Pages.SignUpSlides"
            pager="true">
    <ion-slide>
              <app-tutorial image="assets/sign-up/slide-1.jpg">
                  <app-icon-message icon="interests"
                                    [iconColor]="Color.White"
                                    [iconBackground]="Color.BlackTranslucent"
                                    [message]="'page.signup.slide-1.message' | translate"
                                    [messageColor]="Color.White"
                                    messageFontSize="1.25rem"
                                    [messageTranslucent]="true">
                  </app-icon-message>
              </app-tutorial>
          </ion-slide>

          <ion-slide>
              <app-tutorial image="assets/sign-up/slide-2.jpg">
                  <app-icon-message icon="newspaper"
                                    [iconColor]="Color.White"
                                    [iconBackground]="Color.BlackTranslucent"
                                    [message]="'page.signup.slide-2.message' | translate"
                                    [messageColor]="Color.White"
                                    messageFontSize="1.25rem"
                                    [messageTranslucent]="true">
                  </app-icon-message>
              </app-tutorial>
          </ion-slide>

          <ion-slide>
              <app-tutorial image="assets/sign-up/slide-3.jpg">
                  <app-icon-message [fill]="false"
                                    icon="notifications"
                                    [iconColor]="Color.White"
                                    [iconBackground]="Color.BlackTranslucent"
                                    [message]="'page.signup.slide-3.message' | translate"
                                    [messageColor]="Color.White"
                                    messageFontSize="1.25rem"
                                    [messageTranslucent]="true">
                  </app-icon-message>

                  <app-button-action [text]="'general.go' | translate"
                                     [textColor]="Color.Black"
                                     [color]="Color.White"
                                     (click)="close()">
                  </app-button-action>
              </app-tutorial>
          </ion-slide>
</ion-slides>
