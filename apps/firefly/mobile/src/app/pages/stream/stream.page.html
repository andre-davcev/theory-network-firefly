<ion-content>
  <ion-list>
    <ion-item lines="none" *ngFor="let cluster of stream$ | async">
        <ion-card>
            <app-item-header [iconUrl]="cluster.iconId"
                             [title]="cluster.name"
                             [subtitle]="cluster.tagline">
            </app-item-header>

            <ion-card-content>
                <ion-row>
                    <ion-col size="1">
                        <ion-button slot="start" fill="clear" (click)="subscribe(cluster)">
                            <app-icon name="check" [active]="cluster.subscribed"></app-icon>
                        </ion-button>
                    </ion-col>

                    <ion-col size="11">
                        {{ cluster.description }}
                    </ion-col>
                </ion-row>
            </ion-card-content>
        </ion-card>
    </ion-item>
  </ion-list>
</ion-content>
