<ion-content>
  <ion-list>
    <ion-item lines="none" *ngFor="let subscription of subscriptions$ | async">
        <ion-card>
            <img [src]="subscription.photo">

            <ion-item>
                <ion-label>
                    <h2>{{subscription.name}}</h2>
                    <p>{{subscription.tagline}}</p>
                </ion-label>
            </ion-item>

            <ion-row>
                <ion-col>
                    <ion-button slot="start" fill="clear" (click)="subscribe(subscription)">
                        <app-icon name="check" [active]="subscription.subscribed"></app-icon>
                        {{(subscription.subscribed ? 'page.stream.subscribed' : 'page.stream.subscribe') | translate}}
                    </ion-button>
                </ion-col>

                <ion-col text-right>
                    <ion-button slot="start" fill="clear">

                    </ion-button>
                </ion-col>
            </ion-row>
        </ion-card>
    </ion-item>
  </ion-list>
</ion-content>
