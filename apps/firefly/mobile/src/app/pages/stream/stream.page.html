<ion-content>
  <ion-list>
    <ion-item lines="none" *ngFor="let cluster of stream$ | async">
        <ion-card>
            <app-item-header [iconUrl]="cluster.iconId"
                             [title]="cluster.name"
                             [subtitle]="cluster.tagline">
            </app-item-header>

            <ion-card-content>
                {{ cluster.description }}
            </ion-card-content>
