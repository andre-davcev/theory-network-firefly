<ion-content>
  <ion-list>
    <ion-item lines="none" *ngFor="let cluster of stream$ | async">
        <ion-card>
            <app-item-header [iconUrl]="cluster.iconId"
                             [title]="cluster.name"
                             [subtitle]="cluster.tagline">
            </app-item-header>

            <ion-card-content>
                <ion-row fxLayout="row"
                         fxLayoutAlign="start center">
                    <ion-col size="2">
                        <app-icon-subscribe [subscribed]="cluster.subscribed"
                                            (clicked)="toggle($event, cluster)">
                        </app-icon-subscribe>
                    </ion-col>

                    <ion-col size="10">
                        {{ cluster.description }}
                    </ion-col>
                </ion-row>
            </ion-card-content>
        </ion-card>
    </ion-item>
  </ion-list>
</ion-content>
