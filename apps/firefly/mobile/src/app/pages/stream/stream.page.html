<ion-header>
    <ion-toolbar dark>
        <ion-title>{{'page.stream.title' | translate}}</ion-title>

        <ion-buttons slot="primary">
            <ion-button (click)="dismiss()">{{'general.done' | translate}}</ion-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content>
    <ion-list>
        <ion-item no-lines *ngFor="let subscription of subscriptions$ | async">
            <ion-card>
                <img [src]="subscription.photo">

                <ion-item>
                    <ion-label>
                        <h2>{{subscription.name}}</h2>
                        <p>{{subscription.tagline}}</p>
                    </ion-label>
                </ion-item>

                <ion-row>
                    <ion-col>
                        <ion-button slot="start" fill="clear" (click)="subscribe(subscription)">
                            <app-icon name="check" [active]="subscription.subscribed"></app-icon>
                            {{(subscription.subscribed ? 'page.stream.subscribed' : 'page.stream.subscribe') | translate}}
                        </ion-button>
                    </ion-col>

                    <ion-col text-right>
                        <ion-button slot="start" fill="clear">

                        </ion-button>
                    </ion-col>
                </ion-row>
            </ion-card>
        </ion-item>
    </ion-list>
</ion-content>
