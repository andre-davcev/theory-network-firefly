<ion-header color="white">
    <ion-toolbar >
        <ion-title>{{'page.event.title' | translate}}</ion-title>

        <ion-buttons slot="start">
            <ion-back-button color="dark"></ion-back-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>


<ion-content>
    <form novalidate [formGroup]="form$ | async">
        <app-item-header [form]="form$ | async" [item]="itemHeader" (iconClicked)="navigate(Pages.AssetsClusters)"></app-item-header>
<!--
        <app-item-header icon="assets/icons/temp-coffee-icon-blue.png"
                         title="My cluster title!"
                         subtitle="My subtitle">
        </app-item-header>
-->

        <app-item-map [title]="'general.location' | translate" (click)="navigate(Pages.EventLocation)"></app-item-map>

        <div class="cpt-detail" fxLayout="column">
            <ion-list>
<!--
                <ion-item [routerLink]="['/publisher/cluster/categories']">
                    <ion-icon name="logo-buffer" slot="start"></ion-icon>
                    <ion-label>{{'general.categories' | translate}}</ion-label>
                </ion-item>
-->

<!--
                <ion-item>
                    <ion-icon name="lock" slot="start"></ion-icon>
                    <ion-label>{{'general.isPrivate' | translate}}</ion-label>
                    <ion-toggle formControlName="private" checked="true"></ion-toggle>
                </ion-item>
-->

                <ion-item-group>
                    <ion-item-divider></ion-item-divider>

                    <ion-item>
                        <ion-label>{{ 'general.starts' | translate }}</ion-label>
                        <ion-datetime display-format="MMM D, YYYY h:mm A" picker-format="MMM D h:mm A"></ion-datetime>
                    </ion-item>

                    <ion-item>
                        <ion-label>{{ 'general.ends' |  translate }}</ion-label>
                        <ion-datetime display-format="MMM D, YYYY h:mm A" picker-format="MMM D h:mm A"></ion-datetime>
                    </ion-item>

                    <ion-item-divider></ion-item-divider>

                    <app-item-description [form]="form$ | async"
                                          [item]="itemDescription">
                    </app-item-description>

                    <ion-item-divider></ion-item-divider>
                </ion-item-group>
            </ion-list>
        </div>

        <app-item-image [form]="form$ | async"
                        [item]="itemImage"
                        (imageClicked)="navigate(Pages.ImageSelector)">
        </app-item-image>
