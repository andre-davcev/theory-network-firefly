<ion-header color="white">
    <ion-toolbar >
        <ion-title>
            {{ ((isNew$ | async) ? 'page.event.title.edit.new' : 'page.event.title.edit') | translate }}
        </ion-title>

        <ion-buttons slot="start">
            <ion-back-button color="dark"></ion-back-button>
        </ion-buttons>

        <ion-buttons slot="end">
            <ion-button color="dark" (click)="save()" [disabled]="!(canUpdate$ | async)">
                {{ ((isNew$ | async) ? 'general.publish' : 'general.update') | translate }}
            </ion-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content>
    <form novalidate
          [formGroup]="form$ | async"
          ngxsForm="event.form">
        <app-item-header [form]="form$ | async"
                         [iconUrl]="clusterIcon$ | async"
                         [title]="name"
                         [subtitle]="tagline"
                         iconUrlEmpty="assets/icons/avatar-empty.svg"
                         [titlePlaceholder]="'page.cluster.titlePlaceholder' | translate"
                         [subtitlePlaceholder]="'page.cluster.subtitlePlaceholder' | translate"
                         [iconPlaceholder]="'page.cluster.iconPlaceholder' | translate"
                         (iconClicked)="navigate(Pages.AssetsClusters)">
        </app-item-header>
<!--
        <app-item-header icon="assets/icons/temp-coffee-icon-blue.png"
                         title="My cluster title!"
                         subtitle="My subtitle">
        </app-item-header>
-->

        <app-item-map [title]="'general.location' | translate"
                      (click)="navigate(Pages.EventLocation)">
        </app-item-map>

        <div class="cpt-detail" fxLayout="column">
            <ion-list>
<!--
                <ion-item [routerLink]="['/publisher/cluster/categories']">
                    <ion-icon name="logo-buffer" slot="start"></ion-icon>
                    <ion-label>{{'general.categories' | translate}}</ion-label>
                </ion-item>
-->

<!--
                <ion-item>
                    <ion-icon name="lock" slot="start"></ion-icon>
                    <ion-label>{{'general.isPrivate' | translate}}</ion-label>
                    <ion-toggle formControlName="private" checked="true"></ion-toggle>
                </ion-item>
-->

                <ion-item-group>
                    <ion-item-divider></ion-item-divider>

                    <ion-item>
                        <ion-label>{{ 'general.starts' | translate }}</ion-label>
                        <ion-datetime name="start"
                                      [value]="timeStart$ | async"
                                      [displayFormat]="'date-time.displayFormat' | translate"
                                      [pickerFormat]="'date-time.pickerFormat' | translate"
                                      [cancelText]="'general.cancel' |  translate"
                                      [doneText]="'general.done' | translate"
                                      (ionChange)="timeChanged($event, 'start')">
                        </ion-datetime>
                    </ion-item>

                    <ion-item>
                        <ion-label>{{ 'general.ends' |  translate }}</ion-label>
                        <ion-datetime name="end"
                                      [value]="timeEnd$ | async"
                                      [displayFormat]="'date-time.displayFormat' | translate"
                                      [pickerFormat]="'date-time.pickerFormat' | translate"
                                      [cancelText]="'general.cancel' |  translate"
                                      [doneText]="'general.done' | translate"
                                      (ionChange)="timeChanged($event, 'end')"
                                      [class.cpt-invalid]="!(timeEndValid$ | async)">
                        </ion-datetime>
                    </ion-item>

                    <ion-item-divider></ion-item-divider>

                    <app-item-description [form]="form$ | async"
                                          [title]="'general.description' | translate"
                                          description="description"
                                          [descriptionPlaceholder]="'page.event.descriptionPlaceholder' | translate">
                    </app-item-description>

                    <ion-item-divider></ion-item-divider>
                </ion-item-group>
            </ion-list>
        </div>

        <app-item-image [url]="imageUrl$ | async"
                        [placeholder]="'page.event.imagePlaceholder' | translate"
                        [title]="'general.heroImage' | translate"
                        [edit]="true"
                        (clicked)="navigate(Pages.ImageSelector)">
        </app-item-image>
<!--
        <app-item-description [title]="'general.description' | translate"

                              Ionic team. It is focused on Ionic applications being built with
                              Ionic 2. This includes migrating apps from Ionic 1 to Ionic 2,

                              in Ionic 2. Tickets are completely sold out, and we’re expecting
                              more than 1000 developers – making this the largest Ionic
                              conference ever!"
                              image="assets/images/temp-subscriptions-pokemon-go.jpg">
        </app-item-description>
-->
    </form>
</ion-content>
