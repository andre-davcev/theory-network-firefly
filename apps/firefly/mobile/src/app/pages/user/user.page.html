<ion-header>
    <ion-toolbar elevation="2" color="dark">
        <ion-segment (ionChange)="segmentChanged($event)" color="primary" [value]="Pages.UserProfile">
            <ion-segment-button [value]="Pages.UserProfile">
                <ion-label>{{'page.user-profile.title' | translate}}</ion-label>
            </ion-segment-button>

            <ion-segment-button [value]="Pages.UserSettings">
                <ion-label>{{'page.user-settings.title' | translate}}</ion-label>
            </ion-segment-button>

            <ion-segment-button [value]="Pages.UserAssets">
                <ion-label>{{'page.assets.title' | translate}}</ion-label>
            </ion-segment-button>
        </ion-segment>

        <ion-buttons slot="start">
            <ion-back-button color="primary"></ion-back-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content [ngSwitch]="segment">
    <app-page-user-profile *ngSwitchCase="Pages.UserProfile"></app-page-user-profile>
    <app-page-user-settings *ngSwitchCase="Pages.UserSettings"></app-page-user-settings>
    <app-page-user-assets *ngSwitchCase="Pages.UserAssets"></app-page-user-assets>
</ion-content>
