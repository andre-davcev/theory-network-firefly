<ion-header>
    <ion-toolbar elevation="2" color="dark">
        <ion-segment (ionChange)="segmentChanged($event)" color="primary" value="assets">
            <ion-segment-button value="assets" checked>
                <ion-label>{{'page.user.settings' | translate}}</ion-label>
            </ion-segment-button>

            <ion-segment-button value="profile">
                <ion-label>{{'page.user.profile' | translate}}</ion-label>
            </ion-segment-button>
        </ion-segment>

        <ion-buttons slot="start">
            <ion-back-button color="primary"></ion-back-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content [ngSwitch]="segment">
    <app-page-user-profile *ngSwitchCase="'profile'"></app-page-user-profile>
    <app-page-user-settings *ngSwitchCase="'settings'"></app-page-user-settings>
</ion-content>
