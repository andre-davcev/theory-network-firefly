<ion-slides pager="true" (ionSlideDidChange)="slideChanged()" [options]="slideOptions">
    <ion-slide *ngFor="let alert of alerts$ | async">
        <app-slide [slide]="alert" [buttonText]="'general.go' | translate" (alertGoClicked)="alertGo()" (alertDetailClicked)="alertDetail(alert)"></app-slide>
    </ion-slide>
</ion-slides>
