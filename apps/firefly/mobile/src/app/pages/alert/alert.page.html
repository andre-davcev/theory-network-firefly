<ion-header elevation="1">
    <ion-toolbar color="light">
        <ion-title color="dark">
            {{ 'page.alerts.title' | translate }}
        </ion-title>

        <ion-buttons slot="end">
            <ion-button color="dark" (click)="done()">
                {{ 'general.done' | translate }}
            </ion-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<section class="cpt-events"
         fxLayout="column"
         fxLayoutAlign="center">
    <ion-slides *ngIf="hasUnread$ | async"
                #sliderRef
                pager="true"
                (ionSlideDidChange)="slideChanged()"
                [options]="slideOptions">
        <ion-slide #status *ngFor="let alert of events$ | async">
            <app-slide [slide]="alert"
                        [buttonText]="'general.go' | translate"
                        (alertDeleteClicked)="eventDelete(alert)"
                        (alertGoClicked)="alertGo(alert)"
                        (alertDetailClicked)="navigate( alert)">
            </app-slide>
        </ion-slide>
    </ion-slides>

    <app-icon-message *ngIf="empty$ | async"
                      slot="fixed"
                      [icon]="IconType.Alerts"
                      [message]="(emptyMessage$ | async) | translate">
    </app-icon-message>
</section>
