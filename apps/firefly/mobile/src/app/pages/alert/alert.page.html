<ion-slides *ngIf="found$ | async" pager="true" (ionSlideDidChange)="slideChanged()" [options]="slideOptions">
    <ion-slide *ngFor="let alert of alerts$ | async">
        <app-slide [slide]="alert" [buttonText]="'general.go' | translate" (alertDeleteClicked)="alertDelete(alert)" (alertGoClicked)="alertGo()" (alertDetailClicked)="alertDetail(alert)"></app-slide>
    </ion-slide>
</ion-slides>

<ion-fab vertical="bottom" horizontal="start">
    <ion-button color="transparent" mode="ios">
        <ion-icon name="list" color="dark"></ion-icon>
    </ion-button>
</ion-fab>

<app-icon-message *ngIf="empty$ | async"
                  slot="fixed"
                  [icon]="IconType.Alerts"
                  [message]="'page.alerts.empty' | translate">
</app-icon-message>
