<ion-list *ngIf="searchResultsFound$ | async"
          class="searchResults">
    <ion-item *ngFor="let searchResult of searchResults$ | async"
              lines="none"
              (click)="selectSearchInterest(searchResult)">
        {{searchResult.name}}
    </ion-item>
</ion-list>

<form novalidate
      class="cpt-events"
      *ngIf="(eventType$ | async) === EventType.New && (form$ | async)"
      [formGroup]="form$ | async"
      ngxsForm="alerts.form">
    <ion-slides *ngIf="didInit && ((eventType$ | async) === EventType.New) && (hasUnread$ | async)"
                #sliderRef
                pager="true"
                (ionSlideDidChange)="slideChanged()"
                [options]="slideOptions">
        <ion-slide #status *ngFor="let alert of events$ | async">
            <app-slide [slide]="alert"
                      [buttonText]="'general.go' | translate"
                      (alertDeleteClicked)="eventDelete(alert)"
                      (alertGoClicked)="alertGo(alert)"
                      (alertDetailClicked)="navigate( alert)">
            </app-slide>
        </ion-slide>
    </ion-slides>
</form>

<ion-content *ngIf="(eventType$ | async) !== EventType.New">
    <ion-list>
        <app-item-events *ngFor="let events of events$ | async"
                         [dateEvents]="events"
                         (selected)="navigate($event)"
                         (deleted)="eventDelete($event)">
        </app-item-events>
    </ion-list>

    <app-button-add *ngIf="add$ | async"
                    (clicked)="add()"
                    slot="fixed">
    </app-button-add>
</ion-content>

<app-icon-message *ngIf="empty$ | async"
                  slot="fixed"
                  [icon]="IconType.Alerts"
                  [message]="(emptyMessage$ | async) | translate">
</app-icon-message>
