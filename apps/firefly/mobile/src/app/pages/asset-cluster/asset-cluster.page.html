<ion-header color="white">
    <ion-toolbar >
        <ion-title>{{'page.cluster.title' | translate}}</ion-title>

        <ion-buttons slot="start">
            <ion-back-button color="dark"></ion-back-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>


<ion-content>
    <form novalidate
          [formGroup]="form$  | async"
          ngxsForm="cluster.form">
        <app-item-header [form]="form$ | async"
                         [iconUrl]="clusterIcon$ | async"
                         [title]="AssetKey.Name"
                         [subtitle]="ClusterKey.Tagline"
                         iconUrlEmpty="assets/icons/avatar-empty.svg"
                         [titlePlaceholder]="'page.event.titlePlaceholder' | translate"
                         [subtitlePlaceholder]="'page.event.subtitlePlaceholder' | translate"
                         [iconPlaceholder]="'page.event.iconPlaceholder' | translate"
                         (iconClicked)="navigate(Pages.IconSelector)">
        </app-item-header>
