<ion-header>
    <ion-navbar dark>
        <ion-segment [(ngModel)]="segment">
            <ion-segment-button value="clusters">{{'tabs.publisher.clusters' | translate}}</ion-segment-button>
            <ion-segment-button value="assets">{{'tabs.publisher.assets' | translate}}</ion-segment-button>
        </ion-segment>

        <ion-buttons end>
            <button ion-button (click)="dismissModal()">{{'general.done' | translate}}</button>
        </ion-buttons>
    </ion-navbar>
</ion-header>

<ion-content [ngSwitch]="segment">
    <ion-fab bottom right (click)="add()">
        <button ion-fab color="secondary">
            <ion-icon name="md-add"></ion-icon>
        </button>
    </ion-fab>

    <div *ngSwitchCase="'clusters'">
        <app-page-publisher-clusters></app-page-publisher-clusters>
    </div>

    <div *ngSwitchCase="'assets'">
        <app-page-publisher-assets></app-page-publisher-assets>
    </div>

</ion-content>
