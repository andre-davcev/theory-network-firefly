<ion-header class="app-transparent ff-page-alerts">
    <ion-navbar transparent>
        <ion-buttons start>
            <button ion-button icon-only color="white" (click)="find()">
                <ion-icon name="search"></ion-icon>
            </button>
        </ion-buttons>
        <ion-buttons end>
            <button ion-button icon-only color="white" (click)="subscriptions()">
                <ion-icon name="options"></ion-icon>
            </button>
        </ion-buttons>
    </ion-navbar>
</ion-header>

<ion-content class="ff-primary-background">
    <ion-slides ion-fixed pager (ionSlideDidChange)="slideChanged()">
        <ion-slide *ngFor="let alert of alerts">
            <div class="ff-card">
                <h1 class="ff-title">{{alert.title}}</h1>
                <h2 class="ff-short">{{alert.body}}</h2>
                <img class="ff-image" [src]="alert.image">
                <button class="ff-button">{{'pages.notifications.addCoupon' | translate}}</button>
                <p class="ff-paragraph">{{alert.date}}</p>
            </div>
        </ion-slide>
    </ion-slides>
</ion-content>
