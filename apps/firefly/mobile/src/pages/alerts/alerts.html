<ion-header class="app-transparent ff-page-alerts">
    <ion-toolbar transparent>
        <ion-buttons start>
            <button ion-button icon-only (click)="navigate(AlertsModalType.Search)">
                <ion-icon name="search" color="dark"></ion-icon>
            </button>
            <button ion-button icon-only (click)="navigate(AlertsModalType.Feed)">
                <ion-icon name="md-paper" color="dark"></ion-icon>
            </button>
            <button ion-button icon-only (click)="navigate(AlertsModalType.Subscriptions)">
                <ion-icon name="options" color="dark"></ion-icon>
            </button>
            <button ion-button icon-only (click)="navigate(AlertsModalType.Publish)">
                <ion-icon name="md-add" color="dark"></ion-icon>
            </button>
            <button ion-button icon-only (click)="navigate(AlertsModalType.Settings)">
                <ion-icon name="settings" color="dark"></ion-icon>
            </button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content class="ff-primary-background">
    <ion-slides ion-fixed pager (ionSlideDidChange)="slideChanged()">
        <ion-slide *ngFor="let alert of alerts">
            <div class="ff-card">
                <h1 class="ff-title">{{alert.title}}</h1>
                <h2 class="ff-short">{{alert.body}}</h2>
                <img class="ff-image" [src]="alert.image">
                <button class="ff-button">{{'pages.notifications.addCoupon' | translate}}</button>
                <p class="ff-paragraph">{{alert.date}}</p>
            </div>
        </ion-slide>
    </ion-slides>

    <ion-fab bottom left>
        <button ion-button icon-only color="transparent">
            <ion-icon name="md-globe" color="dark"></ion-icon>
        </button>
    </ion-fab>

    <ion-fab bottom right>
        <button ion-button icon-only color="transparent">
            <ion-icon name="md-trash" color="dark"></ion-icon>
        </button>
    </ion-fab>
</ion-content>
