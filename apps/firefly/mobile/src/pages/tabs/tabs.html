<ion-tabs [selectedIndex]="selected">
    <ion-tab [root]="tabs[0]" tabTitle="{{'tabs.app.notifications' | translate}}" tabIcon="bug" [tabBadge]="alerts.unviewed" tabBadgeStyle="secondary"></ion-tab>
    <ion-tab [root]="tabs[1]" tabTitle="{{'tabs.app.publisher' | translate}}"     tabIcon="logo-rss"></ion-tab>
    <ion-tab [root]="tabs[2]" tabTitle="{{'tabs.app.settings' | translate}}"      tabIcon="settings"></ion-tab>

<!--

</ion-tabs>
