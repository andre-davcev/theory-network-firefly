<ion-content class="app-transparent" (click)="dismissModal()">
    <ion-searchbar (ionInput)="filter($event)" (click)="clickedSearch()"></ion-searchbar>
    <ion-list (click)="clickedSearch()">
        <ion-item *ngFor="let item of items">
          {{ item }}
        </ion-item>
      </ion-list>
</ion-content>
