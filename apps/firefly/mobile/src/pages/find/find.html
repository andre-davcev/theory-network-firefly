<ion-header>
    <ion-navbar dark>
        <ion-segment [(ngModel)]="segment">
            <ion-segment-button value="stream">{{'tabs.find.stream' | translate}}</ion-segment-button>
            <ion-segment-button value="discover">{{'tabs.find.discover' | translate}}</ion-segment-button>
            <ion-segment-button value="categories">{{'tabs.find.categories' | translate}}</ion-segment-button>
        </ion-segment>
    </ion-navbar>
</ion-header>

<ion-content [ngSwitch]="segment">
    <div class="scroll-content" *ngSwitchCase="'stream'">
        <app-page-find-stream></app-page-find-stream>
    </div>

    <div class="scroll-content" *ngSwitchCase="'discover'">
        <app-page-find-discover></app-page-find-discover>
    </div>

    <div class="scroll-content" *ngSwitchCase="'categories'">
        <app-page-find-categories></app-page-find-categories>
    </div>
</ion-content>
