<ion-header>
    <ion-navbar>
        <ion-title>{{'page.assets-clusters.title' | translate}}</ion-title>
    </ion-navbar>
</ion-header>


<ion-content>
    <ion-fab bottom right (click)="add()">
        <button ion-fab color="secondary">
            <ion-icon name="md-add"></ion-icon>
        </button>
    </ion-fab>

    <app-list title="name" subtitle="tagline" icon="icon" [data]="clusters" (clicked)="clicked($event)" (deleted)="deleted($event)"></app-list>
</ion-content>
