<div class="ff-splash" [class.ff-login]="ready">
    <div class="tn-container ff-container-app-title tn-align tn-animate tn-transform">
        <div class="tn-align-item tn-align-fixed">
            <div class="ff-container-logo tn-align">
                <firefly class="ff-color-primary tn-animate tn-transform tn-align-item" [class.ff-animate]="!ready"></firefly>
            </div>

            <img class="ff-app-title tn-animate tn-transform" src="img/app.title@2x.png">
            <span class="ff-tagline tn-animate tn-transform tn-opacity">{{ 'page.auth.tagline' | translate }}</span>
        </div>
    </div>

    <div class="tn-container ff-container-auth tn-animate tn-opacity tn-transform">
        <div class="ff-auth-email">
<!--
            <div class="ff-container-inputs">
                <tn-input-email [tn-host-classes]="'tn-ico fa-icon fa-envelope-o'" [(tn-value)]="user.email.value" [tn-placeholder]="'page.auth.placeholderEmail' | translate" [tn-clear]="user.email.clear" [tn-validate]="user.email.validate" [tn-verifying]="user.email.verifying" [tn-required]="true" [tn-spinner-classes]="spinner-light" [tn-valid]="user.email.valid" [tn-valid-input]="user.email.validInput" (tn-change)="user.email.changed"></tn-input-email>

                <div class="ff-divider"></div>

                <tn-input-password [tn-host-classes]="'tn-ico fa-icon fa-lock'" [(tn-value)]="user.password.value" [tn-placeholder]="'page.auth.placeholderPassword' | translate" [tn-required]="true" [tn-clear]="user.password.clear" [tn-validate]="user.password.validate" [tn-valid-input]="user.password.validInput"></tn-input-password>
            </div>
-->

            <button class="tn-button ff-button" (click)="login(AuthProvider.Email)">
                <span class="ff-text">{{'page.auth.signIn' | translate}}</span>
            </button>
        </div>

        <div class="ff-divider tn-align">
            <span class="tn-align-item tn-align-fixed">{{'page.auth.divider' | translate}}</span>
        </div>

        <div class="tn-container-reset ff-buttons">
            <button class="tn-button tn-provider tn-facebook" (click)="create()" [disabled]="(userAuthenticating$ | async)">
                <span class="tn-item">{{'page.auth.create' | translate}}</span>
            </button>

            <button class="tn-button tn-provider tn-facebook" (click)="login(AuthProvider.Facebook)" [disabled]="(userAuthenticating$ | async)">
                <span class="tn-item">{{'page.auth.facebook' | translate}}</span>
            </button>

            <button class="tn-button tn-provider tn-google" (click)="login(AuthProvider.Google)" [disabled]="(userAuthenticating$ | async)">
                <span class="tn-item">{{'page.auth.google' | translate}}</span>
            </button>
<!--
            <button class="tn-button tn-provider tn-twitter" (click)="login(AuthProvider.Twitter)" [disabled]="(userAuthenticating$ | async)">
                <span class="tn-item">{{'page.auth.twitter' | translate}}</span>
            </button>
        -->
        </div>
<!--
        <div class="ff-footer tn-flex">
            <div class="ff-item tn-align-left">
                <a class="ff-item ff-link">{{'page.auth.forgotPassword' | translate}}</a>
                <span class="ff-item">|</span>
                <a class="ff-item ff-link">{{'page.auth.forgotName' | translate}}</a>
            </div>

            <div class="ff-item tn-align-right">
                <span class="ff-item">{{'page.auth.newUser' | translate}}</span>
                <a class="ff-item ff-link ff-underline">{{'page.auth.signUp' | translate}}</a>
            </div>
        </div>
-->
    </div>
</div>
