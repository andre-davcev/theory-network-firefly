<ion-header>
  <ion-toolbar>
      <ion-buttons slot="secondary" fxLayout="row" fxLayoutAlign="space-between center">
          <ion-button icon-only (click)="navigate(AlertsModalType.Search)">
              <ion-icon name="search" color="dark" size="large"></ion-icon>
          </ion-button>
          <ion-button icon-only (click)="navigate(AlertsModalType.Feed)">
              <ion-icon name="md-paper" color="dark" size="large"></ion-icon>
          </ion-button>
          <ion-button icon-only (click)="navigate(AlertsModalType.Subscriptions)">
              <ion-icon name="options" color="dark" size="large"></ion-icon>
          </ion-button>
          <ion-button icon-only (click)="navigate(AlertsModalType.Publish)">
              <ion-icon name="md-add" color="dark" size="large"></ion-icon>
          </ion-button>
          <ion-button icon-only (click)="navigate(AlertsModalType.Settings)">
              <ion-icon name="settings" color="dark" size="large"></ion-icon>
          </ion-button>
      </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-slides pager="true" (ionSlideDidChange)="slideChanged()">
    <ion-slide *ngFor="let notification of notifications$ | async">
        <app-slide [slide]="notification" [buttonText]="'general.go' | translate"></app-slide>
    </ion-slide>
</ion-slides>

<ion-footer>
  <ion-toolbar>
      <ion-buttons slot="secondary" fxLayout="row" fxLayoutAlign="space-between center">
          <ion-button icon-only>
              <ion-icon name="md-globe" color="dark" size="large"></ion-icon>
          </ion-button>
          <ion-button icon-only>
              <ion-icon name="md-trash" color="dark" size="large"></ion-icon>
          </ion-button>
      </ion-buttons>
  </ion-toolbar>
</ion-footer>
