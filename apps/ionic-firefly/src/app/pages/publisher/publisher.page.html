<ion-header>
    <ion-nav dark>
        <ion-nav>
            <ion-title>{{'tabs.publisher.clusters' | translate}}</ion-title>
        </ion-nav>

        <ion-buttons end>
            <ion-button (click)="dismissModal()">{{'general.done' | translate}}</ion-button>
        </ion-buttons>
    </ion-nav>
</ion-header>

<ion-content [ngSwitch]="segment">
    <ion-fab bottom right (click)="add()">
        <ion-fab-button color="secondary">
            <ion-icon name="md-add"></ion-icon>
        </ion-fab-button>
    </ion-fab>

    <div *ngSwitchCase="'clusters'">

    </div>
</ion-content>
