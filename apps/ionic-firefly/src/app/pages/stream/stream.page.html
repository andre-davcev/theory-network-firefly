<ion-header>
    <ion-nav dark>
        <ion-title>{{'page.stream.title' | translate}}</ion-title>

        <ion-buttons end>
            <ion-button (click)="dismissModal()">{{'general.done' | translate}}</ion-button>
        </ion-buttons>
    </ion-nav>
</ion-header>

<ion-content>
    <ion-list class="ff-list">
        <ion-item no-lines class="ff-primary-background" *ngFor="let subscription of subscriptions">
            <ion-card>
                <img [src]="subscription.photo">

                <ion-item>
                    <h2>{{subscription.name}}</h2>
                    <p>{{subscription.tagline}}</p>
                </ion-item>

                <ion-row>
                    <ion-col>
                        <ion-button clear icon-start (click)="subscribe(subscription)">
                            <app-icon name="check" [active]="subscription.subscribed"></app-icon>
                            {{(subscription.subscribed ? 'page.stream.subscribed' : 'page.stream.subscribe') | translate}}
                        </ion-button>
                    </ion-col>

                    <ion-col text-right>
                        <ion-button icon-start clear>

                        </ion-button>
                    </ion-col>
                </ion-row>
            </ion-card>
        </ion-item>
    </ion-list>

    <ion-infinite-scroll (ionInfinite)="doInfinite($event)">
        <ion-infinite-scroll-content></ion-infinite-scroll-content>
    </ion-infinite-scroll>
</ion-content>
