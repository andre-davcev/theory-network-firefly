<ion-header>
    <ion-toolbar>
        <ion-title>{{'page.cluster-locations-add.title' | translate}}</ion-title>

        <ion-buttons end>
            <ion-button (click)="dismissModal()">{{'general.done' | translate}}</ion-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content class="app-transparent" (click)="dismissModalWithCheck()">
    <ion-searchbar (ionInput)="search($event)" (click)="clickedSearch()"></ion-searchbar>

    <ion-list class="page-list">
        <button ion-item *ngFor="let place of results$ | async" (click)="add(place)">
            <ion-icon name="pin" color="secondary" item-start></ion-icon>
            {{ place.description }}
        </button>
    </ion-list>
</ion-content>
