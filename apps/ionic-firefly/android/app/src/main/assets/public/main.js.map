module.exports = "<form novalidate class=\"cpt-container\" [formGroup]=\"form\" *ngIf=\"edit\">\r\n    <h4 class=\"cpt-title\" fxFlexAlign=\"center\">{{title}}</h4>\r\n\r\n    <ion-textarea class=\"cpt-description\" [placeholder]=\"descriptionPlaceholder\" [formControlName]=\"description\" [class.cpt-empty]=\"!imageValue\"></ion-textarea>\r\n\r\n    <input class=\"cpt-image-hidden\" type=\"hidden\" [formControlName]=\"image\">\r\n\r\n    <section class=\"cpt-image-container\" fxLayout=\"column\" fxLayoutAlign=\"center\" (click)=\"clickedImage()\" [class.cpt-image-valid]=\"imageValue\">\r\n        <h4 class=\"cpt-image-placeholder\" *ngIf=\"!imageValue\">{{imagePlaceholder}}</h4>\r\n        <img class=\"cpt-image\" [src]=\"imageValue\" *ngIf=\"imageValue\">\r\n    </section>\r\n</form>\r\n\r\n<div class=\"cpt-container\" *ngIf=\"!edit\">\r\n    <h4 class=\"cpt-title\">{{title}}</h4>\r\n\r\n    <p class=\"cpt-description\">{{description}}</p>\r\n\r\n    <img class=\"cpt-image\" [src]=\"imageValue\">\r\n</div>\r\n"
