module.exports = "<ion-list no-lines>\r\n    <ion-item-sliding *ngFor=\"let row of flattened; let i = index\">\r\n        <ion-item>\r\n          <ion-label>\r\n            <ion-button (click)=\"eventClicked(data[i])\">\r\n                <ion-avatar item-start>\r\n                    <img [src]=\"row.icon\">\r\n                </ion-avatar>\r\n\r\n                <h3>{{row.title}}</h3>\r\n                <p>{{row.subtitle}}</p>\r\n            </ion-button>\r\n\r\n            <ion-item-options>\r\n                <ion-button color=\"secondary\" (click)=\"eventDeleted(data[i])\">\r\n                    <ion-icon name=\"trash\"></ion-icon>\r\n                    {{'general.delete' | translate}}\r\n                </ion-button>\r\n            </ion-item-options>\r\n          </ion-label>\r\n      </ion-item>\r\n    </ion-item-sliding>\r\n</ion-list>\r\n"
