<ion-app>
  <ion-menu
    side="end"
    type="reveal"
    content-id="main"
    [swipeGesture]="false"
    (ionDidClose)="menuClosed()"
    (ionWillOpen)="menuOpened()"
  >
    <ion-content color="dark">
      <ion-list lines="none">
        <ion-item-group>
          <ion-item
            routerDirection="root"
            [routerLink]="[Pages.Home, Pages.Stream]"
            routerLinkActive="cpt-selected"
            (click)="go()"
          >
            <ion-icon name="home" slot="start" color="primary"></ion-icon>
            <ion-label color="medium">{{ 'menu.home' | translate }}</ion-label>
          </ion-item>

          <ion-item
            routerDirection="root"
            [routerLink]="[Pages.UserProfile]"
            routerLinkActive="cpt-selected"
            (click)="go()"
          >
            <ion-icon name="settings" slot="start" color="primary"></ion-icon>
            <ion-label color="medium">{{
              'menu.account.profile' | translate
            }}</ion-label>
          </ion-item>

          <ion-item (click)="logout()">
            <ion-icon name="lock-open" slot="start" color="primary"></ion-icon>
            <ion-label color="medium">{{
              'menu.account.log-out' | translate
            }}</ion-label>
          </ion-item>
        </ion-item-group>
      </ion-list>
    </ion-content>
  </ion-menu>

  <ion-router-outlet id="main"></ion-router-outlet>
</ion-app>
