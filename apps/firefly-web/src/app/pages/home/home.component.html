<header
  id="home"
  class="w-full h-full flex items-center justify-center h-screen bg-fixed bg-center bg-cover custom-img text-white"
>
  <div class="cpt-info h-full flex-1 flex flex-col justify-end pl-20 pb-28 gap-20">
    <div class="cpt-heading tracking-wide leading-none flex flex-col gap-2">
      <h1 class="cpt-title text-5xl">Firefly</h1>
      <h1 class="cpt-subtitle text-4xl">Life comes to you</h1>
    </div>
    <div class="cpt-description text-2xl leading-tight tracking-wide">
      <p>Engaging your community through a fun and lightweight eventing app.</p>
    </div>
    <div class="cpt-app-stores flex flex-row align-between gap-16">
      <tn-app-store-ios></tn-app-store-ios>
      <tn-app-store-google></tn-app-store-google>
    </div>
  </div>
  <div class="cpt-phone flex-1 h-full flex flex-col justify-between pt-16 pb-28">
    <div class="w-full flex flex-row justify-center">
      <ff-nav class="top-16 right-20"></ff-nav>
    </div>

    <div class="w-full flex flex-row justify-center">
      <tn-device-iphone url="/assets/images/device-iphone-screenshot.png"></tn-device-iphone>
    </div>
  </div>
</header>
<div
  id="features"
  class="w-full pt-20 pb-20 pl-60 pr-60 flex flex-col gap-20 justify-between items-center"
>
  <div class="text-5xl">Features</div>
  <div class="w-full flex flex-row justify-between">
    <div class="cpt-feature flex flex-col gap-4 w-52">
      <img class="cpt-img h-32" src="/assets/icons/heart.svg">
      <p class="cpt-desc text-2xl text-center">Follow interests</p>
    </div>
    <div class="cpt-feature flex flex-col gap-4 w-52">
      <img class="cpt-img h-32" src="/assets/icons/location.svg">
      <p class="cpt-desc text-2xl text-center">Find events in your area</p>
    </div>
    <div class="cpt-feature flex flex-col gap-4 w-52">
      <img class="cpt-img h-32" src="/assets/icons/calendar.svg">
      <p class="cpt-desc text-2xl text-center">Add to calendar</p>
    </div>
    <div class="cpt-feature flex flex-col gap-4 w-52">
      <img class="cpt-img h-32" src="/assets/icons/photos.svg">
      <p class="cpt-desc text-2xl text-center">Live your best life</p>
    </div>
  </div>
  <div class="cpt-app-stores flex flex-row align-between gap-16">
    <tn-app-store-ios></tn-app-store-ios>
    <tn-app-store-google></tn-app-store-google>
  </div>
</div>
<section
  id="privacy"
  class="container flex items-center justify-center h-96 m-auto bg-fixed bg-center bg-cover rounded-xl custom-img"
>
  <div class="p-5 text-2xl text-white bg-purple-300 bg-opacity-50 rounded-xl">
    Parralax inline
  </div>
</section>
<section class="cpt-footer h-20 w-full"></section>
