<a class="tn-list-item">
    <div class="tn-transclude tn-animate tn-transform" ng-class="{'ff-animate' : animate}" ng-click="click($event)" ng-if="tnDelete" ng-transclude></div>
    <span class="tn-button tn-delete tn-animate tn-transform" ng-if="tnDelete" ng-click="remove($event)">{{::tnDictionary.tnListItemDeleteLabel}}</span>
    <input type="radio" class="tn-transclude tn-input" ng-blur="blur($event)">
    <div class="tn-transclude" ng-if="!tnDelete" ng-transclude></div>
</a>
