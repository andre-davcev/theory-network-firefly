<ion-header elevation="1">
  <ion-toolbar color="light">
    <ion-title>{{ 'page.user-profile.title' | translate }}</ion-title>

    <ion-buttons slot="end">
      <ion-button icon-only (click)="menuOpen()" [disabled]="menuOpen$ | async">
        <ff-icon [name]="IconType.Menu" [color]="Color.Dark"> </ff-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!--
    <form novalidate
          *ngIf="form$ | async"
          [formGroup]="form$ | async"
          ngxsForm="user-profiles.form">
        <ff-item-header [form]="form$ | async"
                        [iconUrl]="iconUrl$ | async"
                        title="nameFirst"
                        subtitle="nameLast"
                        iconUrlEmpty="assets/icons/avatar-empty.svg"
                        [titlePlaceholder]="'page.user-profile.titlePlaceholder' | translate"
                        [subtitlePlaceholder]="'page.user-profile.subtitlePlaceholder' | translate"
                        [iconPlaceholder]="'page.user-profile.iconPlaceholder' | translate"
                        (iconClicked)="selectIcon()">
        </ff-item-header>
    </form>
-->
  <form
    novalidate
    *ngIf="formUser$ | async as formUser"
    [formGroup]="formUser"
    ngxsForm="users.form"
  >
    <ion-list>
      <ion-item-group>
        <ion-item-divider></ion-item-divider>

        <ion-item>
          <ion-icon name="mail" slot="start"></ion-icon>
          <ion-label>{{ email$ | async }}</ion-label>
        </ion-item>

        <ion-item>
          <ion-icon name="logo-rss" slot="start"></ion-icon>
          <ion-label
            >{{ 'page.user-profile.isPublisher' | translate }}</ion-label
          >

          <ion-toggle
            color="primary"
            formControlName="isPublisher"
            (ionChange)="toggleIsPublisher($event)"
          >
          </ion-toggle>
        </ion-item>

        <ion-item-divider></ion-item-divider>

        <div class="cpt-delete--button" fxLayout="row" fxLayoutAlign="center">
          <ion-button
            color="secondary"
            size="default"
            (click)="deleteAccount()"
          >
            <ion-icon name="trash"></ion-icon>
            {{ 'page.user-profile.deleteAccount' | translate }}
          </ion-button>
        </div>

        <ion-item-divider></ion-item-divider>
      </ion-item-group>
    </ion-list>
  </form>
</ion-content>
