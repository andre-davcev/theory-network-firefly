    <ion-title color="dark"> {{ 'page.calendar.title' | translate}} </ion-title>

    <ion-buttons slot="end">
      <ion-button icon-only (click)="menuOpen()" [disabled]="menuOpen$ | async">
        <ion-icon name="person" color="dark" size="large"></ion-icon>
      </ion-button>
    </ion-buttons>

</ion-header>

<section fxLayout="column" fxLayoutAlign="center">
  <ion-list *ngIf="searchResultsFound$ | async" class="searchResults">
    <ion-item
      *ngFor="let searchResult of searchResults$ | async"
      lines="none"
      (click)="selectSearchInterest(searchResult)"
    >
      {{searchResult.name}}
    </ion-item>
  </ion-list>

  <ion-content>
    <ion-list>
      <ff-item-events
        *ngFor="let events of data$ | async"
        [dateEvents]="events"
        [showDelete]="true"
        (selected)="navigate($event)"
        (deleted)="delete($event)"
      >
      </ff-item-events>
    </ion-list>

    <ion-infinite-scroll threshold="100px" (ionInfinite)="loadData()">
      <ion-infinite-scroll-content
        loadingSpinner="bubbles"
        [loadingText]="'page.calendar.loading' | translate"
      >
      </ion-infinite-scroll-content>
    </ion-infinite-scroll>
  </ion-content>

  <ff-icon-message
    *ngIf="!(exists$ | async)"
    slot="fixed"
    [icon]="IconType.Alerts"
    [message]="(emptyMessage$ | async) || '' | translate"
  >
  </ff-icon-message>
</section>
