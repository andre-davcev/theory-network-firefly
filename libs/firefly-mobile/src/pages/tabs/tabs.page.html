<ion-tabs>
  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="events">
      <ion-icon name="location"></ion-icon>
      <div class="cpt-tab--title">{{ 'tab.events' | translate }}</div>
    </ion-tab-button>

    <ion-tab-button tab="lists">
      <ion-icon name="list-circle"></ion-icon>
      <div class="cpt-tab--title">{{ 'tab.lists' | translate }}</div>
    </ion-tab-button>

    <ion-tab-button tab="notifications">
      <ion-icon name="notifications"></ion-icon>
      <div class="cpt-tab--title">{{ 'tab.notifications' | translate }}</div>
    </ion-tab-button>

    <ion-tab-button tab="calendar">
      <ion-icon name="calendar-number"></ion-icon>
      <div class="cpt-tab--title">{{ 'tab.calendar' | translate }}</div>
    </ion-tab-button>
    <!--
    <ion-tab-button tab="search">
      <ion-icon name="search"></ion-icon>
      {{ 'tab.search' | translate }}
    </ion-tab-button>
-->
  </ion-tab-bar>
</ion-tabs>
