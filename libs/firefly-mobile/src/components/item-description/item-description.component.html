<form novalidate class="cpt-container" [formGroup]="form" *ngIf="edit">
  <h4 class="cpt-title" fxFlexAlign="center">{{ title }}</h4>

  <ion-textarea
    class="cpt-description"
    [placeholder]="descriptionPlaceholder"
    [formControlName]="description"
    [autoGrow]="true"
    maxlength="1000"
  >
  </ion-textarea>
  <div
    class="error-messages"
    *ngIf="
      form.get('description').invalid &&
      (form.get('description').dirty || form.get('description').touched)
    "
  >
    Please add a description
  </div>
</form>

<div class="cpt-container" *ngIf="!edit">
  <h4 class="cpt-title">{{ title }}</h4>

  <p class="cpt-description">{{ description }}</p>
</div>
