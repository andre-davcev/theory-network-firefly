<ff-loading *ngIf="(mapReady$ | async) === false"
             [color]="Color.Dark"
             [colorBackground]="Color.Map"
             [text]="mapLoadingText">
</ff-loading>

<mgl-map *ngIf="mapReady$ | async"
         [style]="style"
         [zoom]="[10]"
         [center]="place?.centerLike || (locationLike$ | async)"
         [interactive]="interactive"
         [movingMethod]="mapMovingMethod"
         [trackResize]="false"
         [keyboard]="false"
         (mapLoad)="onLoad($event)"
         #map>
    <mgl-control mglNavigation position="bottom-left" *ngIf="web$ | async"></mgl-control>

    <mgl-marker [lngLat]="locationLike$ | async">
        <ff-map-orb></ff-map-orb>
    </mgl-marker>

<!--
    <mgl-control *ngIf="geocode"
                 mglGeocoder
                 [position]="geocodePosition"
                 [placeholder]="placeholder"
                 [limit]="limit"
                 [language]="language$ | async"
                 [flyTo]="flyTo"
                 [proximity]="locationLiteral$ | async"
                 [bbox]="bbox"
                 [zoom]="zoom"
                 [types]="types.join(',')"
                 [minLength]="minLength"
                 (clear)="eventClear()"
                 (loading)="eventLoading($event)"
                 (geocoderResults)="eventResults($event)"
                 (geocoderResult)="eventResult($event)"
                 (geocoderError)="eventError($event)">
    </mgl-control>
-->

    <ng-container *ngIf="place">
        <mgl-marker [lngLat]="place.center"
                    [draggable]="false"
                    [anchor]="MapboxMarkerAnchor.Bottom">
            <ff-map-pin [added]="true"></ff-map-pin>
        </mgl-marker>

        <mgl-popup [closeOnClick]="false"
                   [closeButton]="false"
                   [lngLat]="place.center"
                   [anchor]="MapboxMarkerAnchor.BottomLeft"
                   [offset]="annotationOffset">
            <ff-map-annotation [title]="place.title"
                                [description]="place.description">
            </ff-map-annotation>
        </mgl-popup>
    </ng-container>
</mgl-map>
