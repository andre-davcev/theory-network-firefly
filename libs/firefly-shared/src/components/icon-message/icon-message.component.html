<section fxLayout="column"
         fxLayoutAlign="center center"
         [fxLayoutGap]="gap">
    <div class="cpt-icon"
         elevation="i-1,i1"
         fxLayout="column"
         fxLayoutAlign="center center">
        <app-icon [name]="icon"
                  [size]="IconSize.Huge"
                  [color]="iconColor">
        </app-icon>
    </div>

    <p class="cpt-message">
        {{ message }}
    </p>
</section>
