<div class="cpt-container">
  <ion-chip
    *ngFor="let tag of tags; let i = index"
    [color]="tag.color"
    [disabled]="tag.disabled"
    [style.background]="background(i, tag)"
    [style.color]="color(i, tag)"
    [style.border-color]="borderColor(i, tag)"
    [elevation]="elevation(i)"
    (click)="chipClicked(i, tag)"
  >
    <ion-label>{{ tag.display }}</ion-label>
    <ion-icon
      *ngIf="edit"
      [name]="closeIcon"
      (click)="closeClicked(i, tag)"
    ></ion-icon>
  </ion-chip>
</div>
