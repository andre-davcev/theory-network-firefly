<img class="cpt-background-image" [src]="iconUrl">
<div class="cpt-background"></div>

<div class="cpt-icon-container" (click)="clickedIcon()">
    <img class="cpt-icon" [src]="iconUrl">
    <p class="cpt-icon-placeholder" *ngIf="!iconValue">{{item.iconPlaceholder}}</p>
</div>

<form novalidate class="cpt-container" [formGroup]="form" *ngIf="edit">    
    <input class="cpt-icon-hidden" type="hidden" [formControlName]="item.icon" *ngIf="!item.iconAsUrl">
    <input class="cpt-title"  type="text"  [formControlName]="item.title"    [placeholder]="item.titlePlaceholder">
    <div class="error-messages" *ngIf="form.get('name').invalid && (form.get('name').dirty || form.get('name').touched)">
        Please add a name
    </div>
    <input class="cpt-subtitle" type="text" [formControlName]="item.subtitle" [placeholder]="item.subtitlePlaceholder">
    <div class="error-messages" *ngIf="form.get('tagline').invalid && (form.get('tagline').dirty || form.get('tagline').touched)">
        Please add a tagline
    </div>
</form>

<div class="cpt-container" *ngIf="!edit">
    <h3 class="cpt-title">{{item.title}}</h3>
    <h4 class="cpt-subtitle">{{item.subtitle}}</h4>
</div>
