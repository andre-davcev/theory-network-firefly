<div>
  <img class="cpt-background-image" [ngClass]="!iconUrl?'cpt-background-image-placeholder':'cpt-background-image-fit'" [src]="url" (click)="clickedIcon()">
</div>
<div *ngIf="!iconUrl" class="cpt-background"></div>

<div *ngIf="!iconUrl" class="cpt-icon-container" (click)="clickedIcon()">
    <img class="cpt-icon" [src]="url">
    <p class="cpt-icon-placeholder">{{ iconPlaceholder }}</p>
</div>
<form novalidate class="cpt-container" [formGroup]="form" *ngIf="edit">
    <input class="cpt-title"  type="text" [formControlName]="title" [placeholder]="titlePlaceholder">
    <div  class="error-messages" *ngIf="!iconUrl && edit && hasError(title)">
        Please add a name
    </div>
    <input class="cpt-subtitle" type="text" [formControlName]="subtitle" [placeholder]="subtitlePlaceholder">
    <div  class="error-messages" *ngIf="!iconUrl && edit && hasError(subtitle)">
        Please add a tagline
    </div>
</form>

<div class="cpt-container" *ngIf="!edit">
    <h3 class="cpt-title">{{ title }}</h3>
    <h4 class="cpt-subtitle">{{ subtitle }}</h4>
</div>
