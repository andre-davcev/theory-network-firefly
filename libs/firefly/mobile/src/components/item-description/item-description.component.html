<form novalidate class="cpt-container" [formGroup]="form" *ngIf="edit">
    <h4 class="cpt-title" fxFlexAlign="center">{{item.title}}</h4>

    <ion-textarea class="cpt-description" [placeholder]="item.descriptionPlaceholder" [formControlName]="item.description"></ion-textarea>    
</form>

<div class="cpt-container" *ngIf="!edit">
    <h4 class="cpt-title">{{item.title}}</h4>

    <p class="cpt-description">{{item.description}}</p>    
</div>
