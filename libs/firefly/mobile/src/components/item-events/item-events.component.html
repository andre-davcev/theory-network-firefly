<ion-item-group>
    <ion-item-divider>
        <ion-label>{{ dateEvents.date | timestamp:'dateLong' }}</ion-label>
    </ion-item-divider>

    <ion-item-sliding *ngFor="let event of dateEvents.events"
                      (click)="select(event)"
                      [disabled]="event.timeNotify">
        <ion-item>
            <ion-avatar slot="start">
                <img [src]="event.metadata.image">
            </ion-avatar>

            <ion-label class="cpt-time">
                {{ event.timeStart | timestamp:'shortTime' }}
            </ion-label>

            <ion-label>
                <h2>{{ event.name }}</h2>
                <p>{{ event.tagline }}</p>
            </ion-label>
        </ion-item>

        <ion-item-options side="end">
            <ion-item-option color="secondary"
                             (click)="deleteClicked(event)">
                {{ 'general.delete' | translate }}
            </ion-item-option>
        </ion-item-options>
    </ion-item-sliding>
</ion-item-group>
