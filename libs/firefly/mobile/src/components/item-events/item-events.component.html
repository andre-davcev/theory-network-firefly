<ion-item-group *ngIf="dateEvents?.date">
    <ion-item-divider>
        <ion-label>{{ dateEvents.date | timestamp: TimestampFormat.DateLong }}</ion-label>
    </ion-item-divider>

    <ion-item-sliding *ngFor="let event of dateEvents.events"
                      #sliding
                      (click)="select(event, sliding)">
        <ion-item>
            <ion-avatar slot="start">
                <ion-img [src]="event.metadata?.image"></ion-img>
            </ion-avatar>

            <ion-label class="cpt-time">
                {{ event.timeStart | timestamp: TimestampFormat.ShortTime }}
            </ion-label>

            <ion-label>
                <h2>{{ event.name }}</h2>
                <p>{{ event.tagline }}</p>
            </ion-label>
        </ion-item>

        <ion-item-options *ngIf="showDelete" side="end">
            <ion-item-option [color]="event.notifyComplete ? 'grey' : 'secondary'"
                             [class.cpt-disabled]="event.notifyComplete"
                             (click)="delete(event)">
                {{ 'general.delete' | translate }}
            </ion-item-option>
        </ion-item-options>
    </ion-item-sliding>
</ion-item-group>
