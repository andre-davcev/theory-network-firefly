<form [formGroup]="form"
      fxLayout="column"
      fxLayoutGap="1.125rem">
    <section class="cpt-inputs"
             fxLayout="column">
        <section fxLayout="row"
                 fxLayoutAlign="start center">
            <fa-icon [icon]="faEnvelope"
                     [classes]="['cpt-icon-email']">
            </fa-icon>
            <ion-input formControlName="id"
                       mode="ios"
                       type="email"
                       inputmode="email"
                       clearInput="true"
                       clearOnEdit="true"
                       [placeholder]="'page.auth.placeholderEmail' | translate"
                       required="true">
            </ion-input>
        </section>

        <section *ngIf="!resetPassword" fxLayout="row"
                 fxLayoutAlign="start center">
            <fa-icon [icon]="faLock"></fa-icon>
            <ion-input formControlName="password"
                       mode="ios"
                       type="password"
                       inputmode="password"
                       clearInput="true"
                       clearOnEdit="true"
                       [placeholder]="'page.auth.placeholderPassword' | translate"
                       required="!resetPassword">
            </ion-input>
        </section>
    </section>

    <section class="cpt-buttons"
             fxLayout="column">
        <ion-button mode="ios"
                    [disabled]="form.invalid || authenticating"
                    (click)="clicked()">
            <span class="cpt-button-text">
                {{ (login ? 'general.login' : resetPassword ? 'general.resetPassword' : 'general.signup') | translate}}
            </span>
        </ion-button>
    </section>
</form>
