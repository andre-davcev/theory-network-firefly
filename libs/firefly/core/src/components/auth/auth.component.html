<form [formGroup]="form"
      fxLayout="column"
      fxLayoutGap="1rem">
    <section class="cpt-inputs"
             fxLayout="column">
        <section fxLayout="row"
                 fxLayoutAlign="start center">
            <fa-icon [icon]="faEnvelope"
                     [classes]="['cpt-icon-email']">
            </fa-icon>
            <ion-input formControlName="email"
                       mode="ios"
                       type="email"
                       inputmode="email"
                       pattern="email"
                       autofocus="true"
                       clearInput="true"
                       clearOnEdit="true"
                       [placeholder]="'page.auth.placeholderEmail' | translate"
                       required="true">
            </ion-input>
        </section>

        <section fxLayout="row"
                 fxLayoutAlign="start center">
            <fa-icon [icon]="faLock"></fa-icon>
            <ion-input formControlName="password"
                       mode="ios"
                       type="password"
                       inputmode="password"
                       pattern="password"
                       clearInput="true"
                       clearOnEdit="true"
                       [placeholder]="'page.auth.placeholderPassword' | translate"
                       required="true">
            </ion-input>
        </section>
    </section>

    <section class="cpt-buttons"
             fxLayout="column">
        <ion-button [disabled]="form.invalid || authenticating"
                    (click)="clicked()">
            <span>{{ (login ? 'general.login' : 'general.signup') | translate}}</span>
        </ion-button>
    </section>
</form>
