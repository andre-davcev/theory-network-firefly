<app-loading *ngIf="!(mapReady$ | async)"
             [color]="Color.Dark"
             [colorBackground]="Color.Map"
             [text]="mapLoadingText">
</app-loading>

<mgl-map *ngIf="mapReady$ | async"
         [style]="style"
         [zoom]="[10]"
         [center]="place?.centerLike || (locationLike$ | async)"
         [interactive]="interactive"
         [movingMethod]="mapMovingMethod"
         #map>
    <mgl-control mglNavigation position="bottom-left" *ngIf="web$ | async"></mgl-control>

    <mgl-marker [lngLat]="locationLike$ | async">
        <app-map-orb></app-map-orb>
    </mgl-marker>

    <mgl-control *ngIf="geocode"
                 mglGeocoder
                 [position]="geocodePosition"
                 [searchInput]="searchInput"
                 [placeholder]="placeholder"
                 [limit]="limit"
                 [language]="language$ | async"
                 [flyTo]="flyTo"
                 [proximity]="locationLiteral$ | async"
                 [bbox]="bbox"
                 [zoom]="zoom"
                 [types]="types.join(',')"
                 [minLength]="minLength"
                 (clear)="eventClear($event)"
                 (loading)="eventLoading($event)"
                 (results)="eventResults($event)"
                 (result)="eventResult($event)"
                 (error)="eventError($event)">
    </mgl-control>

    <ng-container *ngIf="place">
        <mgl-marker [lngLat]="place.center"
                    [draggable]="false"
                    [anchor]="MapboxMarkerAnchor.Bottom"
                    #marker>
            <app-map-pin [added]="true"></app-map-pin>
        </mgl-marker>

        <mgl-popup [marker]="marker"
                   [closeOnClick]="false"
                   [closeButton]="false"
                   [anchor]="MapboxMarkerAnchor.BottomLeft"
                   [offset]="annotationOffset">
            <app-map-annotation [title]="place.title"
                                [description]="place.description">
            </app-map-annotation>
        </mgl-popup>
    </ng-container>
</mgl-map>
