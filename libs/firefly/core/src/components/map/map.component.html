<mgl-map *ngIf="locationValid$ | async" [style]="'mapbox://styles/mapbox/streets-v9'" [zoom]="[10]" [center]="center" [interactive]="interactive">
    <mgl-control mglNavigation position="bottom-left" *ngIf="web$ | async"></mgl-control>

    <mgl-marker [lngLat]="center">
        <app-map-orb></app-map-orb>
    </mgl-marker>
</mgl-map>
