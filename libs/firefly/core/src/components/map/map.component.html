<mgl-map *ngIf="mapReady$ | async" [style]="'mapbox://styles/mapbox/streets-v9'" [zoom]="[10]" [center]="center" [interactive]="interactive">
    <mgl-control mglNavigation position="bottom-left" *ngIf="web$ | async"></mgl-control>

    <mgl-marker [lngLat]="center">
        <app-map-orb></app-map-orb>
    </mgl-marker>

    <mgl-control mglGeocoder *ngIf="geocode" position="top-left"></mgl-control>
</mgl-map>
