<div class="cpt-container"
     fxLayout="row"
     fxLayoutGap="4px"
     fxLayoutAlign="start center">
    <ion-icon name="heart"
              size="large"
              [color]="subscribed ? 'secondary' : 'dark'"
              (click)="toggle()">
    </ion-icon>

    <span class="cpt-count">{{ count | number: '.0' }} {{ 'general.subscribers' | translate }}</span>
</div>
