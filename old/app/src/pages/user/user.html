<ion-header>
    <ion-navbar dark>
        <ion-segment [(ngModel)]="segment">
            <ion-segment-button value="profile">{{dictionary.tabProfile}}</ion-segment-button>
            <ion-segment-button value="settings">{{dictionary.tabSettings}}</ion-segment-button>
        </ion-segment>
    </ion-navbar>
</ion-header>

<ion-content [ngSwitch]="segment">
    <ion-list *ngSwitchCase="'profile'">
        <app-page-user-profile></app-page-user-profile>
    </ion-list>

    <ion-list *ngSwitchCase="'settings'">
        <app-page-user-settings></app-page-user-settings>
    </ion-list>
</ion-content>
